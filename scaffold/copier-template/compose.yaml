services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: '[[ project_slug ]]'
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/[[ project_slug ]]
      RUST_LOG: info
      CORS_ALLOWED_ORIGINS: http://localhost:3001
      FRONTEND_URL: http://localhost:3001
      API_URL: http://localhost:3000
      JWT_SECRET: change_me_in_dev
      APP_NAME: '[[ project_name ]]'
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      MAIL_FROM: noreply@[[ project_slug ]].local
      SMTP_FROM_NAME: '[[ project_name ]]'
    depends_on:
      - postgres
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - ../kaleido:/kaleido:ro

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile.dev
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/[[ project_slug ]]
      RUST_LOG: info
      APP_NAME: '[[ project_name ]]'
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      MAIL_FROM: noreply@[[ project_slug ]].local
      SMTP_FROM_NAME: '[[ project_name ]]'
    depends_on:
      - postgres
    volumes:
      - .:/app
      - ../kaleido:/kaleido:ro

  ui-next:
    build:
      context: ./ui-next
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_CDN_URL: http://localhost:3000/uploads
    depends_on:
      - api
    ports:
      - '3001:3000'
    volumes:
      - ./ui-next:/app
      - ../kaleido:/kaleido:ro
      - ui_next_node_modules:/app/node_modules

volumes:
  postgres_data:
  ui_next_node_modules:
